name: Fetch data & deploy to Pages

on:
  schedule:
    # Every 6 minutes, odd minutes on purpose: :00/:20/:40 are GitHub's most
    # congested cron slots and get dropped; odd minutes fire far more reliably.
    # GitHub still drops/delays many scheduled firings under load — the dense
    # schedule means even a 50% drop rate keeps real-world updates ~10 min apart.
    - cron: "1,7,13,19,25,31,37,43,49,55 * * * *"
  push:
    branches: [main, master]
  workflow_dispatch:

# Least privilege: Pages deployment + actions:write for the cron keepalive.
permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

# Never run two deploys at once.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      # GitHub silently disables scheduled workflows after 60 days without
      # repo activity. Re-enabling the workflow via the API resets that timer,
      # so the site can never freeze without a human noticing.
      - name: Keep scheduled runs alive
        if: github.event_name == 'schedule'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/enable"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch live data
        run: node scripts/fetch-data.mjs
        env:
          MB511_API_KEY: ${{ secrets.MB511_API_KEY }}

      - name: Prune non-site files from artifact
        run: rm -rf node_modules scripts .github

      - uses: actions/upload-pages-artifact@v5
        with:
          path: .

      # GitHub Pages occasionally throws a transient "Deployment failed, try
      # again later." — retry once before letting the run go red.
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
