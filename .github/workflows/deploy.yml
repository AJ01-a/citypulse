name: Fetch data & deploy to Pages

on:
  schedule:
    # Off-peak minutes on purpose: :00/:20/:40 are GitHub's most congested
    # cron slots and get dropped; odd minutes fire far more reliably.
    - cron: "9,29,49 * * * *"
  push:
    branches: [main, master]
  workflow_dispatch:

# Least privilege: only what Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch live data
        run: node scripts/fetch-data.mjs
        env:
          MB511_API_KEY: ${{ secrets.MB511_API_KEY }}

      - name: Prune non-site files from artifact
        run: rm -rf node_modules scripts .github

      - uses: actions/upload-pages-artifact@v5
        with:
          path: .

      # GitHub Pages occasionally throws a transient "Deployment failed, try
      # again later." — retry once before letting the run go red.
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
